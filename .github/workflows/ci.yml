name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # Read the Go version from go.mod so it can't drift from what the
          # module's deps require (Fyne v2.7+ bumps this past 1.22).
          go-version-file: go.mod
          cache: true

      - name: Install Fyne build deps (X11, OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc pkg-config \
            libgl1-mesa-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev xorg-dev

      - name: go vet
        run: go vet ./...

      - name: go test
        # -cover triggers `go: no such tool "covdata"` on packages without
        # _test.go files under actions/setup-go's install. Keep -race for the
        # data-race sanity check; coverage is exercised locally via `make test`.
        run: go test -race ./...

      - name: Build binary
        run: |
          mkdir -p bin
          go build -trimpath -o bin/claude-monitor ./cmd/claude-monitor

      - name: Headless safety test (§11)
        run: |
          set -e
          # Verify the binary does not crash with no display.
          env -i HOME=$(mktemp -d) PATH=/usr/bin XDG_RUNTIME_DIR=$(mktemp -d) \
            ./bin/claude-monitor version
          env -i HOME=$(mktemp -d) PATH=/usr/bin XDG_RUNTIME_DIR=$(mktemp -d) \
            ./bin/claude-monitor help > /dev/null
          echo "OK: CLI runs without DISPLAY/WAYLAND_DISPLAY"
