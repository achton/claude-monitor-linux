name: Release

# Two ways to trigger:
#   1. Push a vX.Y.Z tag (manual `git tag && git push --tags`).
#   2. Click "Run workflow" in the Actions UI and pick patch/minor/major.
#      That path computes the next semver from the latest tag, creates the
#      tag, pushes it, and runs the same build/release path.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which semver part to bump'
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Compute next version + create + push tag. Only runs for manual UI
  # invocations; tag pushes skip this job entirely.
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.compute.outputs.new_version }}
    steps:
      - name: Verify dispatched from main
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::This workflow can only be run from main (got ${{ github.ref }})"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history to find the latest tag

      - name: Compute next version
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest" ]]; then latest="v0.0.0"; fi
          echo "Latest tag: $latest"
          version="${latest#v}"
          IFS='.' read -r major minor patch <<<"$version"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new="v${major}.${minor}.${patch}"
          echo "New version: $new"
          if git rev-parse "$new" >/dev/null 2>&1; then
            echo "::error::Tag $new already exists"
            exit 1
          fi
          echo "new_version=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEW: ${{ steps.compute.outputs.new_version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$NEW" -m "$NEW — released via the Release workflow (bump=${{ inputs.bump }})"
          git push origin "$NEW"

  release:
    needs: [tag]
    # Run on either:
    #   - tag push (the `tag` job was skipped — its result is "skipped")
    #   - manual dispatch (the `tag` job succeeded)
    # `always()` is the canonical workaround for an OR condition with `needs`.
    if: |
      always() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && needs.tag.result == 'success')
      )
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve checkout ref and version
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            echo "ref=${{ needs.tag.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ needs.tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc pkg-config librsvg2-bin gzip \
            libgl1-mesa-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev xorg-dev

      - name: Install nfpm and appimagetool
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          mkdir -p ~/.local/bin
          curl -fsSL -o ~/.local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x ~/.local/bin/appimagetool
          # AppImage on CI requires FUSE or extraction; appimagetool supports --appimage-extract-and-run.
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Strip 'v' prefix
        id: ver
        run: |
          raw="${{ steps.ref.outputs.tag }}"
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: make build VERSION=${{ steps.ver.outputs.version }}

      - name: Test
        run: make test

      - name: Headless safety test
        run: make headless-test

      - name: Icons + man page
        run: make icons manpage VERSION=${{ steps.ver.outputs.version }}

      - name: Build .deb
        run: make deb VERSION=${{ steps.ver.outputs.version }}

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: make appimage VERSION=${{ steps.ver.outputs.version }}

      - name: Checksums
        run: make checksums

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          files: |
            dist/*.deb
            dist/*.AppImage
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
